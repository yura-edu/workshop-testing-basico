# yura.workshop.yaml — declarative grader config
# Spec: docs/grader-workers-spec.md §6
# Generated from prisma/seeds/workshop-templates.seed.ts

schema_version: "1.0"
workshop:
  id: testing-basico
  title: "Testing Básico"
  type: testing
  language: typescript
  passing_threshold: 70
  base_branch: main
submission:
  source: workshop_link
  required_inputs:
    - type: github_repo_url
      label: "URL del repositorio"
      required: true
evaluation_profile:
  - metric_id: test_coverage
    weight: 40
    threshold: 0.7
    config:
      runner: vitest
      coverage_tool: c8
      coverage_format: lcov
      report_path: coverage/lcov.info
      include_paths:
        - src/
      exclude_paths:
        - tests/
        - "**/__init__.py"
        - "**/*.spec.ts"
        - "**/*.test.ts"
      min_coverage_percent: 70
      min_coverage_per_file: 0
      timeout_seconds: 300
      extra_args: []
  - metric_id: test_pass_rate
    weight: 35
    threshold: 1
    config:
      runner: vitest
      report_format: vitest_json
      report_path: reports/test-results.json
      min_pass_rate_percent: 100
      timeout_seconds: 300
  - metric_id: lint_violations
    weight: 25
    threshold: 0
    config:
      tool: eslint
      severity_levels:
        - error
        - warning
      fail_on: error
      max_violations: 0
